version: 2
updates:
  # Keep Go modules patched.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps:"
    labels:
      - dependencies

  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci:"
    labels:
      - dependencies
      - github-actions
