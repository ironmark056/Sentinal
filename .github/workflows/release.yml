name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # so git describe sees tags

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: build all platforms
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh

      - name: compute sha256 sums
        run: |
          cd dist
          sha256sum sentinel-* sentinel-server-* > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sentinel-*
            dist/sentinel-server-*
            dist/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
