name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / go ${{ matrix.go }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 -timeout 5m ./...

  build:
    name: build / ${{ matrix.platform.os }}-${{ matrix.platform.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }
          - { os: windows, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.platform.os }}
          GOARCH: ${{ matrix.platform.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for pkg in sentinel sentinel-server; do
            out="dist/${pkg}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then out="${out}.exe"; fi
            go build -trimpath -ldflags "-s -w" -o "$out" "./cmd/${pkg}"
            ls -lh "$out"
          done
